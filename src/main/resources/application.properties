spring.application.name=LojaCarro

# Configuração do Banco de Dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/paulobatalha?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurações do Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:jwt-secret-dev-change-me}
jwt.expiration=86400000

# admin
app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.password=${APP_ADMIN_PASSWORD:admin-dev-change-me}

# cors
app.cors.allowed-origins=http://localhost:63342,http://127.0.0.1:5500,http://localhost:5500