spring.application.name=LojaCarro

# Configuração do Banco de Dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/lojacarro_test?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurações do Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Desativa o aviso chato do Open-In-View que aparecia nos seus logs
spring.jpa.open-in-view=false